<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>급식 보기</title>
    <style>
      @import url(mealboard.css);
    </style>
  </head>
  <body>
    <header>
      <h2>급식 보기</h2>
    </header>
    <div class="main-card">
      2026-04-08
      <div class="time">00:00:00</div>
      <br />
      <div class="date">4월 8일 광주소마고의</div>
      <div class="meal-container">
        <div class="meal-board">
          <span class="meal">오늘의 아침은?</span>
          <span class="meal-card">
            <ul>
              <li>친환경백미밥</li>
              <li>바지락순두부찌개</li>
              <li>피자오믈렛&케첩</li>
              <li>오리슬라이스햄</li>
              <li>배추김치</li>
              <li>골라먹는요플레</li>
            </ul>
          </span>
        </div>
        <div class="meal-board">
          <span class="meal">오늘의 점심은?</span>
          <span class="meal-card">
            <ul>
              <li>친환경백미밥</li>
              <li>바지락순두부찌개</li>
              <li>피자오믈렛&케첩</li>
              <li>오리슬라이스햄</li>
              <li>배추김치</li>
              <li>골라먹는요플레</li>
            </ul>
          </span>
        </div>
        <div class="meal-board">
          <span class="meal">오늘의 저녁은?</span>
          <span class="meal-card">
            <ul>
              <li>친환경백미밥</li>
              <li>바지락순두부찌개</li>
              <li>피자오믈렛&케첩</li>
              <li>오리슬라이스햄</li>
              <li>배추김치</li>
              <li>골라먹는요플레</li>
            </ul>
          </span>
        </div>
      </div>
    </div>
    <button id="btn">급식 불러오기</button>
    <div id="status"></div>
    <script>
      const btn = document.getElementById("btn");
      const mealCards = document.querySelectorAll(".meal-card");
      const status = document.getElementById("status");
      btn.addEventListener("click", async function () {
        status.innerText = "로딩중";
        try {
          const res = await fetch(
            "https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=3e77d09b778e43ccb762f2e5e5a69b26&Type=json&ATPT_OFCDC_SC_CODE=F10&SD_SCHUL_CODE=7380031&MLSV_YMD=20260408",
          );
          const data = await res.json();
          status.innerText = "";
          const rows = data.mealServiceDietInfo[1].row;
          let menu = rows[0].DDISH_NM.split("<br/>");
          menu = menu.map((item) => item.replace(/\([^)]*\)/g, "").trim());
          const text = menu.join("<br>");
          mealCards.forEach((card) => {
            card.innerHTML = text;
          });
        } catch (e) {
          status.innerText = "에러 발생";
        }
      });
    </script>
  </body>
</html>
